INHERIT: tpl/cfg/mkdocs_base.yml

docs_dir: src/zh
site_dir: site

site_name: ECOS Studio
site_url: !ENV READTHEDOCS_CANONICAL_URL

edit_uri: edit/main/doc/src/zh

repo_url: https://github.com/openecos-projects/studio-doc
repo_name: openecos-projects/studio-doc

theme:
  palette:
  - scheme: default
    primary: teal
    accent: teal
    toggle:
      icon: material/brightness-7
      name: 切换到深色模式
  - scheme: slate
    primary: teal
    accent: teal
    toggle:
      icon: material/brightness-4
      name: 切换到浅色模式
  language: zh

extra:
  alternate:

nav:
  - 项目主页: index.md
